<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIAA Field Hockey Playoffs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root, [data-theme="light"] {
  --bg:       #f7f6f2;
  --surface:  #ffffff;
  --surface2: #f3f0ec;
  --border:   oklch(from #28251d l c h / 0.12);
  --divider:  oklch(from #28251d l c h / 0.07);
  --text:     #1a1916;
  --muted:    #6b6a66;
  --faint:    #b0afa9;
  --primary:       #01696f;
  --primary-hover: #0c4e54;
  --primary-text:  #ffffff;
  --d1-bg:  #e4f2f1; --d1-fg: #015a5f;
  --d2-bg:  #fdf0e6; --d2-fg: #7a3a10;
  --win-bg: #eaf4ea; --win-fg: #1a5c1a;
  --loss-fg: var(--muted);
  --r-sm: 4px; --r-md: 6px; --r-lg: 10px;
  --shadow: 0 1px 3px oklch(0.2 0.01 80 / 0.09), 0 4px 12px oklch(0.2 0.01 80 / 0.06);
  --ease: 160ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"] {
  --bg:#141311;--surface:#1c1b19;--surface2:#242320;
  --border:oklch(from #cdccca l c h / 0.14);--divider:oklch(from #cdccca l c h / 0.07);
  --text:#d0cfc9;--muted:#7a7975;--faint:#4e4d4a;
  --primary:#4f98a3;--primary-hover:#3e8592;--primary-text:#0f1e20;
  --d1-bg:#1b2e30;--d1-fg:#5db3bf;--d2-bg:#2a1e14;--d2-fg:#d4845a;
  --win-bg:#1a2e1a;--win-fg:#7dca7d;--loss-fg:var(--faint);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){--bg:#141311;--surface:#1c1b19;--surface2:#242320;--border:oklch(from #cdccca l c h / 0.14);--divider:oklch(from #cdccca l c h / 0.07);--text:#d0cfc9;--muted:#7a7975;--faint:#4e4d4a;--primary:#4f98a3;--primary-hover:#3e8592;--primary-text:#0f1e20;--d1-bg:#1b2e30;--d1-fg:#5db3bf;--d2-bg:#2a1e14;--d2-fg:#d4845a;--win-bg:#1a2e1a;--win-fg:#7dca7d;--loss-fg:var(--faint)}}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;font-size:14px}
body{font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;color:var(--text);background:var(--bg)}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}

.embed{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow);font-size:13px}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 0;gap:8px}
.embed-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.theme-btn{width:28px;height:28px;border-radius:2px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background var(--ease),color var(--ease)}
.theme-btn:hover{background:var(--surface2);color:var(--text)}

.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 14px 10px}

/* Era toggle — exact match to realignment tool */
.era-toggle{display:flex;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;flex-shrink:0}
.era-btn{padding:6px 10px;font-size:12px;font-weight:500;color:var(--muted);white-space:nowrap;transition:background var(--ease),color var(--ease)}
.era-btn.active{background:var(--primary);color:var(--primary-text)}
.era-btn:not(.active):hover{background:var(--surface2);color:var(--text)}

/* Div toggle */
.div-toggle{display:flex;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;flex-shrink:0}
.div-btn{padding:6px 10px;font-size:12px;font-weight:500;color:var(--muted);white-space:nowrap;transition:background var(--ease),color var(--ease)}
.div-btn.active.d1{background:var(--d1-bg);color:var(--d1-fg);font-weight:600}
.div-btn.active.d2{background:var(--d2-bg);color:var(--d2-fg);font-weight:600}
.div-btn:not(.active):hover{background:var(--surface2);color:var(--text)}

.bracket-scroll{padding:10px 14px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.bracket-scroll::-webkit-scrollbar{height:4px}
.bracket-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.bracket{display:flex;gap:0;align-items:flex-start;min-width:max-content}
.round{display:flex;flex-direction:column;width:176px;flex-shrink:0}
.round-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 6px 6px;white-space:nowrap;height:22px}
.matchups{display:flex;flex-direction:column}
.round-gap{width:10px;flex-shrink:0}

.matchup{padding:0 6px}
.matchup-inner{border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;background:var(--surface)}

.team-row{display:flex;align-items:center;padding:4px 7px;gap:5px;border-bottom:1px solid var(--divider);min-height:28px}
.team-row:last-child{border-bottom:none}
.team-row.winner{background:var(--win-bg)}
.team-row.loser{background:var(--surface2)}
.team-row.tbd{background:var(--surface2);min-height:28px}
.team-row.neutral{background:var(--surface)}

.seed{font-size:11px;font-weight:700;color:var(--muted);min-width:18px;flex-shrink:0;font-variant-numeric:tabular-nums}
.team-row.winner .seed{color:var(--win-fg)}
.team-row.tbd .seed{visibility:hidden}

.team-name{flex:1;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-row.winner .team-name{color:var(--win-fg);font-weight:600}
.team-row.loser .team-name{color:var(--loss-fg)}
.team-row.tbd .team-name{display:none}

.record{font-size:10px;color:var(--faint);flex-shrink:0}
.prev-seed{font-size:10px;color:var(--faint);flex-shrink:0}
.score{font-size:12px;font-weight:600;min-width:16px;text-align:right;font-variant-numeric:tabular-nums;flex-shrink:0}
.team-row.winner .score{color:var(--win-fg)}
.team-row.loser .score{color:var(--loss-fg)}
.score-note{font-size:10px;color:var(--faint);font-weight:400;margin-left:2px;flex-shrink:0}
.team-row.winner .score-note{color:var(--win-fg);opacity:.75}
</style>
</head>
<body>
<div class="embed" id="embed">
<div class="controls">
    <div class="era-toggle" role="group" aria-label="Year">
      <button class="era-btn active" data-era="2025" aria-pressed="true">2025 (Actual)</button>
      <button class="era-btn" data-era="2027" aria-pressed="false">2027 (Projection)</button>
    </div>
    <div class="div-toggle" role="group" aria-label="Division">
      <button class="div-btn active d1" data-div="d1" aria-pressed="true">Division I</button>
      <button class="div-btn d2" data-div="d2" aria-pressed="false">Division II</button>
    </div>
  </div>
  <div class="bracket-scroll"><div class="bracket" id="bracket"></div></div>
</div>

<script>
(function(){
  /* Card height in px — must match CSS min-height (28px row × 2 + 1px divider + 2px border) */
  const CARD_H   = 59;
  const CARD_GAP = 6;

  const DATA = {
    "2025": {
      d1: { rounds: [
        { label:"Quarterfinals", matchups:[
          {top:{seed:8, name:"Middletown",   record:"9-6",    score:0,win:false}, bot:{seed:1,name:"Smyrna",       record:"14-1",   score:8,win:true}},
          {top:{seed:5, name:"Caesar Rodney",record:"10-5",   score:5,win:true},  bot:{seed:4,name:"Odessa",       record:"11-4",   score:0,win:false}},
          {top:{seed:7, name:"Polytech",     record:"9-6",    score:0,win:false}, bot:{seed:2,name:"Cape Henlopen",record:"14-1",   score:8,win:true}},
          {top:{seed:6, name:"Milford",      record:"7-7-1",  score:1,win:false}, bot:{seed:3,name:"Padua",        record:"11-3-1", score:2,win:true}},
        ]},
        { label:"Semifinals", matchups:[
          {top:{seed:5,name:"Caesar Rodney",score:0,win:false}, bot:{seed:1,name:"Smyrna",       score:8,win:true}},
          {top:{seed:3,name:"Padua",        score:0,win:false}, bot:{seed:2,name:"Cape Henlopen",score:3,win:true}},
        ]},
        { label:"Championship", matchups:[
          {top:{seed:2,name:"Cape Henlopen",score:0,win:false}, bot:{seed:1,name:"Smyrna",score:1,win:true,note:"2 OT"}},
        ]},
      ]},
      d2: { rounds: [
        { label:"First Round", matchups:[
          {top:{seed:9, name:"Sanford",     record:"9-6",  score:1,win:false}, bot:{seed:8, name:"Sussex Academy",   record:"9-6",    score:4,win:true}},
          {top:{seed:12,name:"Tatnall",     record:"7-8",  score:2,win:false}, bot:{seed:5, name:"Ursuline",         record:"11-4",   score:3,win:true,note:"OT"}},
          {top:{seed:10,name:"Lake Forest", record:"10-5", score:1,win:true},  bot:{seed:7, name:"Indian River",     record:"11-4",   score:0,win:false}},
          {top:{seed:11,name:"Concord",     record:"9-6",  score:0,win:false}, bot:{seed:6, name:"Tower Hill",       record:"9-6",    score:4,win:true}},
        ]},
        { label:"Quarterfinals", matchups:[
          {top:{seed:8, name:"Sussex Academy",score:0,win:false}, bot:{seed:1,name:"Wilmington Friends",record:"14-1",  score:1,win:true}},
          {top:{seed:5, name:"Ursuline",      score:2,win:false}, bot:{seed:4,name:"Archmere",          record:"10-5",  score:4,win:true}},
          {top:{seed:10,name:"Lake Forest",   score:1,win:false}, bot:{seed:2,name:"Caravel",           record:"12-2-1",score:2,win:true}},
          {top:{seed:6, name:"Tower Hill",    score:1,win:false}, bot:{seed:3,name:"Newark Charter",    record:"11-4",  score:2,win:true,note:"OT"}},
        ]},
        { label:"Semifinals", matchups:[
          {top:{seed:4,name:"Archmere",      score:0,win:false}, bot:{seed:1,name:"Wilmington Friends",score:4,win:true}},
          {top:{seed:3,name:"Newark Charter",score:2,win:true},  bot:{seed:2,name:"Caravel",           score:1,win:false}},
        ]},
        { label:"Championship", matchups:[
          {top:{seed:3,name:"Newark Charter",score:0,win:false}, bot:{seed:1,name:"Wilmington Friends",score:2,win:true}},
        ]},
      ]},
    },
    "2027": {
      d1: { rounds: [
        { label:"First Round", matchups:[
          {top:{seed:9, name:"Ursuline",      record:"11-4",  prevSeed:"No.\u202F5 D-II"}, bot:{seed:8,name:"Archmere",          record:"10-5",   prevSeed:"No.\u202F4 D-II"}},
          {top:{seed:12,name:"Indian River",  record:"11-4",  prevSeed:"No.\u202F7 D-II"}, bot:{seed:5,name:"Padua",             record:"11-3-1", prevSeed:"No.\u202F3 D-I"}},
          {top:{seed:10,name:"Caesar Rodney", record:"10-5",  prevSeed:"No.\u202F5 D-I"},  bot:{seed:7,name:"Odessa",            record:"11-4",   prevSeed:"No.\u202F4 D-I"}},
          {top:{seed:11,name:"Milford",       record:"7-7-1", prevSeed:"No.\u202F6 D-I"},  bot:{seed:6,name:"Newark Charter",   record:"11-4",   prevSeed:"No.\u202F3 D-II"}},
        ]},
        { label:"Quarterfinals", matchups:[
          {top:{seed:"",name:"",tbd:true}, bot:{seed:1,name:"Smyrna",            record:"14-1",   prevSeed:"No.\u202F1 D-I"}},
          {top:{seed:"",name:"",tbd:true}, bot:{seed:4,name:"Caravel",           record:"12-2-1", prevSeed:"No.\u202F2 D-II"}},
          {top:{seed:"",name:"",tbd:true}, bot:{seed:2,name:"Cape Henlopen",     record:"14-1",   prevSeed:"No.\u202F2 D-I"}},
          {top:{seed:"",name:"",tbd:true}, bot:{seed:3,name:"Wilmington Friends",record:"14-1",   prevSeed:"No.\u202F1 D-II"}},
        ]},
        { label:"Semifinals", matchups:[
          {top:{seed:"",name:"",tbd:true}, bot:{seed:"",name:"",tbd:true}},
          {top:{seed:"",name:"",tbd:true}, bot:{seed:"",name:"",tbd:true}},
        ]},
        { label:"Championship", matchups:[
          {top:{seed:"",name:"",tbd:true}, bot:{seed:"",name:"",tbd:true}},
        ]},
      ]},
      d2: { rounds: [
        { label:"First Round", matchups:[
          {top:{seed:9,  name:"Mount Pleasant",   record:"5-6-3", prevSeed:"D-II"},  bot:{seed:8,  name:"MOT Charter",      record:"6-8",   prevSeed:"D-II"}},
          {top:{seed:12, name:"Laurel",           record:"4-9-2", prevSeed:"D-II"},  bot:{seed:5,  name:"Tatnall",          record:"7-8",   prevSeed:"D-II"}},
          {top:{seed:10, name:"Brandywine",       record:"5-9",   prevSeed:"D-II"},  bot:{seed:7,  name:"St. Andrew's",   record:"7-8",   prevSeed:"D-II"}},
          {top:{seed:11, name:"Sussex Central",   record:"5-10",  prevSeed:"D-I"},   bot:{seed:6,  name:"DMA",              record:"7-8",   prevSeed:"D-II"}},
        ]},
        { label:"Quarterfinals", matchups:[
          {top:{seed:"", name:"", tbd:true}, bot:{seed:1, name:"Polytech",      record:"9-6", prevSeed:"No. 7 D-I"}},
          {top:{seed:"", name:"", tbd:true}, bot:{seed:4, name:"Concord",       record:"9-6", prevSeed:"No. 11 D-II"}},
          {top:{seed:"", name:"", tbd:true}, bot:{seed:2, name:"Tower Hill",    record:"9-6", prevSeed:"No. 6 D-II"}},
          {top:{seed:"", name:"", tbd:true}, bot:{seed:3, name:"Sanford",       record:"9-6", prevSeed:"No. 9 D-II"}},
        ]},
        { label:"Semifinals", matchups:[
          {top:{seed:"", name:"", tbd:true}, bot:{seed:"", name:"", tbd:true}},
          {top:{seed:"", name:"", tbd:true}, bot:{seed:"", name:"", tbd:true}},
        ]},
        { label:"Championship", matchups:[
          {top:{seed:"", name:"", tbd:true}, bot:{seed:"", name:"", tbd:true}},
        ]},
      ]},
    }
  };

  let era = "2025", div = "d1";

  function buildRow(team, showScore) {
    const row = document.createElement("div");
    const cls = team.tbd ? "tbd"
              : showScore ? (team.win ? "winner" : "loser")
              : "neutral";
    row.className = "team-row " + cls;
    if (!team.tbd && team.name) { row.title = team.name; }

    const seedEl = document.createElement("span");
    seedEl.className = "seed";
    seedEl.textContent = (team.seed !== "" && team.seed != null) ? String(team.seed) : "\u00A0";
    row.appendChild(seedEl);

    if (!team.tbd) {
      const nameEl = document.createElement("span");
      nameEl.className = "team-name";
      nameEl.textContent = team.name || "";
      if (team.name) { nameEl.title = team.name; }
      row.appendChild(nameEl);

      if (showScore && team.record) {
        const rec = document.createElement("span");
        rec.className = "record";
        rec.textContent = team.record;
        row.appendChild(rec);
      }
      if (!showScore && team.prevSeed) {
        const ps = document.createElement("span");
        ps.className = "prev-seed";
        ps.textContent = "(" + team.prevSeed + ")";
        row.appendChild(ps);
      }
      if (showScore && typeof team.score !== "undefined") {
        const sc = document.createElement("span");
        sc.className = "score";
        sc.textContent = team.score;
        row.appendChild(sc);
        /* inline OT note next to winning score only */
        if (team.win && team.note) {
          const nt = document.createElement("span");
          nt.className = "score-note";
          nt.textContent = "(" + team.note + ")";
          row.appendChild(nt);
        }
      }
    }
    return row;
  }

  function render() {
    const bracketEl = document.getElementById("bracket");
    const d2btn     = document.querySelector("[data-div='d2']");
    const eraData   = DATA[era];
    const d2ok      = eraData.d2 !== null;
    d2btn.style.display = d2ok ? "" : "none";
    if (!d2ok && div === "d2") {
      div = "d1";
      document.querySelectorAll(".div-btn").forEach(b => b.classList.toggle("active", b.dataset.div === "d1"));
    }

    const divData = eraData[div];
    if (!divData) return;
    const showScore = era === "2025";
    bracketEl.innerHTML = "";

    divData.rounds.forEach((round, ri) => {
      const prevCount = ri > 0 ? divData.rounds[ri - 1].matchups.length : round.matchups.length;
      const thisCount = round.matchups.length;
      const halved    = thisCount < prevCount;

      /*
        paddingTop: half a (card + gap) unit per halving step.
        e.g. 4→2: offset = 1×half, 2→1: offset = 2×half (relative to round 0)
        We compute based on ratio to first round.
      */
      const firstCount  = divData.rounds[0].matchups.length;
      const halvings    = firstCount > thisCount ? Math.round(Math.log2(firstCount / thisCount)) : 0;
      const unit        = CARD_H + CARD_GAP;
      const paddingTop  = halvings === 0 ? 0 : Math.round(unit * Math.pow(2, halvings - 1) - unit / 2);
      const cardGap     = halvings === 0 ? CARD_GAP : Math.round(unit * Math.pow(2, halvings) - CARD_H);

      const col = document.createElement("div");
      col.className = "round";

      const lbl = document.createElement("div");
      lbl.className = "round-label";
      lbl.textContent = round.label;
      col.appendChild(lbl);

      const muWrap = document.createElement("div");
      muWrap.className = "matchups";
      muWrap.style.paddingTop = paddingTop + "px";
      muWrap.style.gap = cardGap + "px";

      round.matchups.forEach(mu => {
        const card  = document.createElement("div");
        card.className = "matchup";
        const inner = document.createElement("div");
        inner.className = "matchup-inner";
        inner.appendChild(buildRow(mu.top, showScore));
        inner.appendChild(buildRow(mu.bot, showScore));
        card.appendChild(inner);
        muWrap.appendChild(card);
      });

      col.appendChild(muWrap);
      bracketEl.appendChild(col);

      if (ri < divData.rounds.length - 1) {
        const gap = document.createElement("div");
        gap.className = "round-gap";
        bracketEl.appendChild(gap);
      }
    });
  }

  document.querySelectorAll(".era-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".era-btn").forEach(b => { b.classList.remove("active"); b.setAttribute("aria-pressed","false"); });
      btn.classList.add("active"); btn.setAttribute("aria-pressed","true");
      era = btn.dataset.era; render();
    });
  });
  document.querySelectorAll(".div-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".div-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active"); div = btn.dataset.div; render();
    });
  });

  const toggle = document.querySelector("[data-theme-toggle]");
  const htmlEl = document.documentElement;
  let theme = "light";
  htmlEl.setAttribute("data-theme", theme);
  toggle && toggle.addEventListener("click", () => {
    theme = theme === "dark" ? "light" : "dark";
    htmlEl.setAttribute("data-theme", theme);
    toggle.innerHTML = theme === "dark"
      ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  });

  render();
})();
</script>
</body>
</html>
